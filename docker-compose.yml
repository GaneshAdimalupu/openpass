networks:
  public:
    driver: bridge
  internal:
    driver: bridge

services:
  # ─── Main Application ───────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openpass-web
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-openpass}?schema=public
    networks:
      - public
      - internal
    depends_on:
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          memory: 256M

  # ─── DB Migrations Lifecycle ────────────────────────────────────────────────
  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openpass-migrator
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-openpass}?schema=public
    command: ['pnpm', '--filter', '@openpass/db', 'prisma', 'migrate', 'deploy']
    networks:
      - internal
    depends_on:
      db:
        condition: service_healthy

  # ─── Database ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: openpass-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-openpass}
    volumes:
      - openpass-db-data:/var/lib/postgresql/data
    networks:
      - internal
    # Do not expose ports to public network in advanced setup
    # expose:
    #   - "5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-openpass}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  openpass-db-data:
